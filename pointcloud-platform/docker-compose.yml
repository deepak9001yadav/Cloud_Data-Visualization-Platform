# ============================================================================
# Docker Compose Configuration
# Point Cloud Visualization Platform
# ============================================================================
# This file orchestrates the backend and frontend services
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # Backend Service
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: pointcloud-backend
    
    # Port mapping: host:container
    ports:
      - "8000:8000"
    
    # Named volumes for persistent storage
    volumes:
      - uploads:/app/uploads
      - processed:/app/processed
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - UPLOAD_DIR=/app/uploads
      - PROCESSED_DIR=/app/processed
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
  
  # ==========================================================================
  # Frontend Service
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    
    container_name: pointcloud-frontend
    
    # Port mapping: host:container
    ports:
      - "8081:80"
    
    # Mount local frontend directory for development
    volumes:
      - ./frontend:/usr/share/nginx/html
      - processed:/usr/share/nginx/html/processed
    
    # Depends on backend service
    depends_on:
      - backend
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

# ============================================================================
# Named Volumes
# ============================================================================
# These volumes persist data even when containers are removed
volumes:
  uploads:
    driver: local
    name: pointcloud-uploads
  
  processed:
    driver: local
    name: pointcloud-processed

# ============================================================================
# Network Configuration
# ============================================================================
# Default bridge network allows inter-container communication
networks:
  default:
    name: pointcloud-network
    driver: bridge
